<!doctype html>
<html lang="en" data-theme="dark" data-aesthetic="synthwave" data-accent="pink" data-density="comfortable" data-grid="on">
<head>
  <meta charset="utf-8" />
  <title>geoffmiller.cloud — Principal Cloud × Agentic AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css?v=54" />
  <link rel="stylesheet" href="components.css?v=54" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="data.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components/Icon.jsx"></script>
  <script type="text/babel" src="components/Charts.jsx"></script>
  <script type="text/babel" src="components/Shell.jsx"></script>
  <script type="text/babel" src="components/CommandPalette.jsx"></script>
  <script type="text/babel" src="components/ChatPage.jsx"></script>
  <script type="text/babel" src="components/ResumePage.jsx"></script>
  <script type="text/babel" src="components/Catalogs.jsx"></script>
  <script type="text/babel" src="components/Achievements.jsx"></script>
  <script type="text/babel" src="components/Extras.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const App = () => {
      const [route, setRoute] = useState(() => localStorage.getItem("route") || "chat");
      const [paletteOpen, setPaletteOpen] = useState(false);
      const [tweaksVisible, setTweaksVisible] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(false);

      const [prefs, setPrefs] = useState(() => {
        try {
          const saved = JSON.parse(localStorage.getItem("prefs") || "null");
          return saved || window.TWEAK_DEFAULTS;
        } catch { return window.TWEAK_DEFAULTS; }
      });

      // Apply prefs to root
      useEffect(() => {
        const root = document.documentElement;
        root.setAttribute("data-theme", prefs.theme);
        root.setAttribute("data-aesthetic", prefs.aesthetic);
        root.setAttribute("data-accent", prefs.accent);
        root.setAttribute("data-density", prefs.density);
        root.setAttribute("data-grid", prefs.grid);
        localStorage.setItem("prefs", JSON.stringify(prefs));
      }, [prefs]);

      useEffect(() => { localStorage.setItem("route", route); window.ROUTE_SET = setRoute; }, [route]);

      // Deep-link helper: GO('resume', { roleId: 'fcb' }) — consumed by target page on mount
      useEffect(() => {
        window.GO = (r, payload) => { window.DEEP_LINK = payload || null; setRoute(r); };
      }, []);

      // ⌘K and numeric shortcuts
      useEffect(() => {
        const onKey = (e) => {
          const mod = e.metaKey || e.ctrlKey;
          if (mod && e.key.toLowerCase() === "k") { e.preventDefault(); setPaletteOpen(o => !o); return; }
          if (mod && "12345678".includes(e.key)) {
            e.preventDefault();
            const ids = ["chat", "resume", "projects", "achievements", "articles", "resources", "about", "contact"];
            setRoute(ids[parseInt(e.key, 10) - 1]);
          }
          if (e.key === "Escape") { setPaletteOpen(false); }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, []);

      // Tweaks toggle listener (registered BEFORE announcing availability)
      useEffect(() => {
        const onMsg = (e) => {
          if (e.data?.type === "__activate_edit_mode") setTweaksVisible(true);
          if (e.data?.type === "__deactivate_edit_mode") setTweaksVisible(false);
        };
        window.addEventListener("message", onMsg);
        window.parent?.postMessage({ type: "__edit_mode_available" }, "*");
        return () => window.removeEventListener("message", onMsg);
      }, []);

      const toggleTheme = () => setPrefs(p => ({ ...p, theme: p.theme === "dark" ? "light" : "dark" }));

      const Page = {
        chat:      window.ChatPage,
        resume:    window.ResumePage,
        projects:  window.ProjectsPage,
        articles:  window.ArticlesPage,
        resources: window.ResourcesPage,
        achievements: window.AchievementsPage,
        about:     window.AboutPage,
        contact:   window.ContactPage,
      }[route] || window.ChatPage;

      return (
        <div className="app" data-screen-label={"page · " + route}>
          <Sidebar route={route} setRoute={setRoute}
                   onOpenPalette={() => setPaletteOpen(true)}
                   sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen}/>
          <div className="main-column">
            <HeaderBar theme={prefs.theme} onToggleTheme={toggleTheme}
                       onOpenPalette={() => setPaletteOpen(true)}
                       onToggleMobile={() => setSidebarOpen(o => !o)} />
            <Page />
          </div>

          <CommandPalette open={paletteOpen} onClose={() => setPaletteOpen(false)} setRoute={setRoute} />
          <TweaksPanel visible={tweaksVisible} prefs={prefs} setPrefs={setPrefs} />
        </div>
      );
    };

    // Wait for components to load, then render
    const tryRender = () => {
      if (!window.ChatPage || !window.ResumePage || !window.ProjectsPage ||
          !window.ArticlesPage || !window.ResourcesPage || !window.AchievementsPage || !window.AboutPage ||
          !window.ContactPage || !window.Sidebar || !window.CommandPalette ||
          !window.TweaksPanel || !window.Icon) {
        setTimeout(tryRender, 30);
        return;
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    };
    tryRender();
  </script>
</body>
</html>
